<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metab settings</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="options-body">
  <main class="options">
    <h1 class="options-title">Metab settings</h1>

    <section class="options-group">
      <h2 class="options-heading">Show these categories</h2>
      <p class="options-note">Cards are drawn only from the categories you keep switched on.</p>
      <div id="category-toggles" class="toggle-list"></div>
    </section>

    <section class="options-group">
      <h2 class="options-heading">Card mix</h2>
      <p class="options-note">How cards are drawn when several categories are on.</p>
      <label class="radio-row">
        <input type="radio" name="balance" value="proportional">
        <span>Proportional: bigger collections appear more often <span class="options-default">(default)</span></span>
      </label>
      <label class="radio-row">
        <input type="radio" name="balance" value="balanced">
        <span>Balanced: every category appears about equally often</span>
      </label>
    </section>

    <section class="options-group">
      <h2 class="options-heading">New card</h2>
      <label class="radio-row">
        <input type="radio" name="frequency" value="tab">
        <span>On every new tab <span class="options-default">(default)</span></span>
      </label>
      <label class="radio-row">
        <input type="radio" name="frequency" value="day">
        <span>Once per day</span>
      </label>
    </section>

    <section class="options-group">
      <h2 class="options-heading">Appearance</h2>
      <label class="radio-row">
        <input type="radio" name="theme" value="system">
        <span>System: match your device <span class="options-default">(default)</span></span>
      </label>
      <label class="radio-row">
        <input type="radio" name="theme" value="light">
        <span>Light</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="theme" value="dark">
        <span>Dark
          <svg class="theme-ghost" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" focusable="false">
            <path d="M12 2.5c-3.9 0-7 3.1-7 7v10.2c0 .7.8 1.1 1.4.7l1.5-1.1c.3-.2.7-.2 1 0l1.6 1.2c.3.2.7.2 1 0l1.5-1.2c.3-.2.7-.2 1 0l1.5 1.2c.3.2.7.2 1 0l1.6-1.2c.3-.2.7-.2 1 0l1.4 1.1c.6.4 1.4 0 1.4-.7V9.5c0-3.9-3.1-7-7-7z" fill="currentColor"/>
            <circle class="ghost-eye" cx="9.3" cy="10" r="1.15"/>
            <circle class="ghost-eye" cx="14.7" cy="10" r="1.15"/>
          </svg>
        </span>
      </label>
    </section>

    <p class="options-saved" id="saved-note" hidden>Saved</p>
  </main>
  <script src="options.js"></script>
</body>
</html>
