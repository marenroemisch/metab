# GitHub Action for the metab repo.
# Upload this file to the repo at the path: .github/workflows/validate.yml
# (In the GitHub web UI: Add file > Create new file, type the path with slashes.)
#
# What it does:
# - On every push and pull request: runs validate.js (schema + editorial rules).
# - Weekly (Monday 06:00 UTC) and on demand: also runs check-links.js and
#   opens/updates an issue if links died.

name: validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate dataset
        run: node validate.js
        working-directory: .

  links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check links
        id: links
        run: node check-links.js
        working-directory: .
      - name: Open issue on dead links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Dead links detected by weekly check (" + new Date().toISOString().slice(0,10) + ")",
              body: "The weekly link check failed. See the workflow run for the list of dead URLs: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId
            });
